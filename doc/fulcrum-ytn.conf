# Quickstart Configuration File for Fulcrum-YTN (Yenten)
#
# This is a Yenten-specific companion to doc/fulcrum-quick-config.conf.
# For a full description of every available option, see
# doc/fulcrum-example-config.conf in the Fulcrum-YTN source tree.
#
# RUNTIME DEPENDENCIES (dynamically-linked Linux build)
#   Debian/Ubuntu:
#     sudo apt-get install -y libqt5network5 libqt5core5a libzmq5 \
#                             libbz2-1.0 zlib1g
#   Skip if you use a fully-static binary from the releases page.
#   See README.md "Runtime dependencies" for the full list.
#
# Key differences from a Bitcoin/BCH setup:
#   - yentend default RPC port is 9982 (mainnet), not 8332
#   - yentend default P2P port is 9981 (mainnet)
#   - coin = YTN  (enables Yenten-compatible PoW hash verification)
#   - zmqpubhashblock is supported; use port 9982 reserved for RPC,
#     so pick a different port for ZMQ, e.g. 9983
#-------------------------------------------------------------------------------

# *REQUIRED* Database directory.
# Yenten mainnet requires ~2 GB at genesis; plan for growth.
# NOTE: Use native path separators: '/' on Unix, '\' on Windows.
datadir = /var/lib/fulcrum-ytn/mainnet

# *REQUIRED* Connect to yentend's JSON-RPC interface.
# Default yentend RPC port is 9982 (mainnet).
bitcoind = 127.0.0.1:9982

# *REQUIRED* RPC username — must match rpcuser= in yenten.conf
rpcuser = ytnuser

# *REQUIRED* RPC password — must match rpcpassword= in yenten.conf
rpcpassword = changeme_use_a_strong_password

# Alternative: use the auto-generated .cookie file instead of rpcuser/rpcpassword:
#rpccookie = /var/lib/yenten/.yenten/.cookie

# *REQUIRED* Set the coin type to YTN so that Fulcrum uses Yenten-compatible
# proof-of-work hash verification when validating block headers.
coin = YTN

# ---------------------------------------------------------------------------
# Listening ports
# ---------------------------------------------------------------------------

# TCP (unencrypted) — standard Electrum port
tcp = 0.0.0.0:50001

# SSL (encrypted) — requires cert= and key= below
ssl = 0.0.0.0:50002

# WebSocket (unencrypted)
#ws = 0.0.0.0:50003

# WebSocket Secure
wss = 0.0.0.0:50004

# Announce only SSL as public service
public_tcp_port = 0
public_ssl_port = 50002
public_wss_port = 50004


# ---------------------------------------------------------------------------
# TLS / SSL certificates
# Generate a self-signed certificate with:
#   openssl req -newkey rsa:2048 -new -nodes -x509 -days 3650 \
#     -keyout server-key.pem -out server-cert.pem
# ---------------------------------------------------------------------------
cert = /etc/fulcrum-ytn/server-cert.pem
key  = /etc/fulcrum-ytn/server-key.pem

# ---------------------------------------------------------------------------
# ZMQ (optional but strongly recommended for low-latency block notifications)
# In yenten.conf add:
#   zmqpubhashblock=tcp://127.0.0.1:9983
# ---------------------------------------------------------------------------
#zmqtcpaddr = tcp://127.0.0.1:9983

# ---------------------------------------------------------------------------
# Peering / server identity
# ---------------------------------------------------------------------------

# Public hostname announced in server.peers (leave commented for private server)
#hostname = your.yenten.node.example.com

# Human-readable description announced to Electrum clients.
banner = Welcome to Fulcrum-YTN — a fast Electrum server for Yenten (YTN).

# ---------------------------------------------------------------------------
# Admin RPC (optional, localhost-only, no authentication — keep firewalled!)
# ---------------------------------------------------------------------------
#admin = 127.0.0.1:8000

# ---------------------------------------------------------------------------
# Performance tuning
# ---------------------------------------------------------------------------

# Number of worker threads (default: number of CPU cores)
#worker_threads = 4

# Maximum number of simultaneous client connections (default: 50000)
#max_clients = 50000

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

# Log timestamp format: 'localtime' (default), 'utc', or 'none'
#ts_format = localtime

# Verbose / debug output (very chatty — only enable for troubleshooting)
#debug = false
